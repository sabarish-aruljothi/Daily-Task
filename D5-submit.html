<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>submitted</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <H1>Your form is submitted</H1>
    <div id="result"> </div>
    
</body>
<script>
    const linkParameter=new URLSearchParams(window.location.search);
    let name= linkParameter.get("name");
    let mail=linkParameter.get("email")
    document.getElementById("result").textContent=`Your name is ${name} and your mail id is ${mail}`
let firstName = localStorage.getItem("firstName");
let lastName = localStorage.getItem("lastName");
let email = localStorage.getItem("email");

document.getElementById("result").textContent = `Your name is ${firstName} ${lastName} and your email is ${email}`;

localStorage.removeItem("firstName");
localStorage.removeItem("lastName");
localStorage.removeItem("email");
</script>
</html>
