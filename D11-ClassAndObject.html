<!DOCTYPE html>

    <title>Class and Object handling</title>

<body>

</body>
<script>
    class Product {
        constructor(id, name, price, stock) {
            this.id = id;
                this.name = name;
                this.price = price;
                this.stock = stock
        }
        isAvailabel() {
            return this.stock > 0
        }

    }


    
    class CartItem {
        constructor (product,quantity){
            this.product = product;
            this.quantity = quantity
        }
        getTotal(){
            return this.product.price * this.quantity;
        }
        applyDiscount(){
               return this.product.price*0.5
        }
        
    }
 let firstProduct = new Product(1, "shirt", 100, 2);
let secondProduct = new CartItem(firstProduct,2)


console.log(`Product:${firstProduct.name},Price:$${firstProduct.price},In stock:${firstProduct.isAvailabel()} `)
console.log(`Cart Item Total:${secondProduct.getTotal() } (${secondProduct.quantity} x $${firstProduct.price})`)
console.log(`Can add to cart:${firstProduct.isAvailabel()}`)
console.log(`Discount:${secondProduct.applyDiscount()}`)
</script>
