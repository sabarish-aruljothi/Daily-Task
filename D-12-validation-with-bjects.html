<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Validation with object class and forms</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <form >
    <label for="studentName">Name</label>
    <input type="text" id="studentName" name="studentName" required>
    <span class="error-message" id="nameError"></span>
    <label for="studentAge">Age</label>
    <input type="number" id="studentAge" name="studentAge" required>
    <span class="error-message" id="ageError"></span>
    <label for="studentMark">Mark</label>
    <input type="number" id="studentMark" name="studentMark" required>
    <span class="error-message" id="markError"></span>
    <button class="mt-3" type="submit">Submit</button>
    </form>

<table id="studentTable">
    <tr>
        <th>Name</th>
        <th>Age</th>
        <th>Mark</th>
        <th>Result</th>
    </tr>
    
</table>

</table>
</body>
<script>
class Student{
    constructor(name,age,mark){
this.name=name;
this.age=age
this.mark=mark;
    }
isPass(){
    return this.mark > 30 ? "Pass" : "Fail";
}
    }


document.querySelector("form button").addEventListener("click",e=>{
    e.preventDefault();
    let studentname=document.getElementById("studentName").value;
    let studentage=document.getElementById("studentAge").value;   
    let studentmark=document.getElementById("studentMark").value;   
   let student1=new Student(studentname,studentage,studentmark)
   let row = document.createElement("tr");
//    row.createElement=`
//    <td>${studentname}</td>
//    <td>${studentage}</td>
//    <td>${studentmark}</td>
//    <td>${student1.isPass()}</td>`

let nameData = document.createElement("td").textContent= studentname
row.appendChild(nameData);
   document.getElementById("studentTable").appendChild(row)

   console.log(studentname)
    console.log(student1.age)
    console.log(student1.isPass())
    
})

</script>
</html>
